<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG card — 256 Tips for Junior Devs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,400..900,0..100,0..1;1,9..144,400..900,0..100,0..1&family=Instrument+Sans:wght@400..900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  body {
    background: #F3EDE1;
    color: #0D0D0D;
    font-family: 'Instrument Sans', system-ui, sans-serif;
    background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='240' height='240'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='1' seed='5' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.07 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Corner mark — same idiom as home OG and per-tip cards */
  .mark {
    position: absolute;
    top: 32px; left: 32px;
    width: 18px; height: 18px;
    background: #FF4133;
    border: 3px solid #0D0D0D;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 64px;
    padding: 56px 80px;
    min-height: 0;
  }

  /* The 16×16 progress grid — replicates the live page's visual language.
     Black gap-lines via container background; ink-bordered + neo-shadowed
     wrapper makes the grid read as a stamped artifact. */
  .grid {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 2px;
    width: 470px;
    height: 470px;
    background: #0D0D0D;
    padding: 2px;
    border: 4px solid #0D0D0D;
    box-shadow: 8px 8px 0 0 #0D0D0D;
    flex-shrink: 0;
  }
  .cell { background: #F3EDE1; }
  .cell--filled { background: #FF4133; }
  .cell--teaser { background: #FFD24D; }

  .text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 28px;
  }

  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-weight: 900;
    font-size: 68px;
    line-height: 0.92;
    letter-spacing: -0.025em;
    font-variation-settings: 'SOFT' 90, 'opsz' 144, 'WONK' 1;
  }
  h1 .red { color: #FF4133; }

  /* Big progress number — echoes the live page's progress display */
  .progress {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-weight: 900;
    font-size: 116px;
    line-height: 1;
    letter-spacing: -0.04em;
    font-variation-settings: 'SOFT' 90, 'opsz' 144, 'WONK' 1;
    color: #0D0D0D;
  }
  .progress .of {
    opacity: 0.25;
    font-size: 0.42em;
    letter-spacing: -0.02em;
  }

  .meta {
    font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .meta .sep { color: #FF4133; margin: 0 12px; opacity: 1; }

  /* Bottom red bar — matches home OG and tip cards */
  .bar {
    height: 56px;
    background: #FF4133;
    border-top: 4px solid #0D0D0D;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    flex-shrink: 0;
    color: #F3EDE1;
    font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <span class="mark" aria-hidden="true"></span>

  <main>
    <div class="grid">__GRID_CELLS__</div>
    <div class="text">
      <h1>256 Tips for<br>Junior Devs<span class="red">.</span></h1>
      <div class="progress">__SHIPPED__<span class="of"> / 256</span></div>
      <p class="meta">Tips shipped <span class="sep">·</span> __REMAINING__ to go</p>
    </div>
  </main>

  <div class="bar">
    <span>ildarakhmetov.com/256tipsdev</span>
    <span>@256tipsdev</span>
  </div>
</body>
</html>
